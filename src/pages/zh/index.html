<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国商标注册 — 专业代理服务</title>
  <meta name="description" content="中国商标查询、注册申请、异议答辩及维权服务，GDPR/CCPA 合规。">
  <link rel="canonical" href="https://your-domain.com/zh/">
  <link rel="alternate" hreflang="zh-cn" href="https://your-domain.com/zh/">
  <link rel="alternate" hreflang="en-us" href="https://your-domain.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://your-domain.com/en/">
  <link rel="stylesheet" href="../../styles/tailwind.css">
</head>
<body class="min-h-screen flex flex-col">
  <header class="py-4 px-6 md:px-8">
    <div class="flex items-center justify-between">
      <a href="/zh/" class="text-xl font-bold text-brand">TMG</a>
      <nav class="hidden md:flex gap-6 text-sm">
        <a href="/zh/" class="hover:text-brand">首页</a>
        <a href="/zh/about.html" class="hover:text-brand">关于</a>
        <a href="/zh/services.html" class="hover:text-brand">服务</a>
        <a href="/zh/contact.html" class="hover:text-brand">联系</a>
      </nav>
    </div>
  </header>
  <main class="flex-1">
    <section class="flex min-h-screen items-center justify-center text-center px-4">
      <div>
        <h1 class="text-4xl font-bold tracking-tight sm:text-5xl md:text-6xl">中国商标注册保护，简明高效</h1>
        <p class="mt-4 text-lg text-slate-600 max-w-2xl mx-auto">涵盖查询、注册、异议及答辩，服务全品类。</p>
        <a class="mt-6 inline-block rounded bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand/90" href="#contact">开始咨询</a>
      </div>
    </section>
    <section class="py-16 px-6 md:px-8">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold text-center mb-10">服务范围</h2>
        <div class="grid md:grid-cols-3 gap-8">
          <div class="bg-white p-6 rounded shadow-sm"><h3 class="font-bold mb-2">商标检索</h3><p class="text-slate-600 text-sm">全面清查，降低驳回风险。</p></div>
          <div class="bg-white p-6 rounded shadow-sm"><h3 class="font-bold mb-2">申请与审查</h3><p class="text-slate-600 text-sm">类别选择、撰写申请、答复审查意见。</p></div>
          <div class="bg-white p-6 rounded shadow-sm"><h3 class="font-bold mb-2">异议与维权</h3><p class="text-slate-600 text-sm">异议答辩、撤销、监测与打击侵权。</p></div>
        </div>
      </div>
    </section>
    <section class="py-16 px-6 md:px-8 bg-slate-50">
      <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-2xl font-bold mb-4">典型案例</h2>
        <div id="featured-case" class="bg-white p-6 rounded shadow-sm text-left">
          <p class="text-slate-500">案例详情将在此处加载。</p>
        </div>
      </div>
    </section>
    <section id="blog" class="py-16 px-6 md:px-8">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold mb-8 text-center">洞察</h2>
        <div id="blog-list" class="grid gap-6"></div>
      </div>
    </section>
  </main>
  <footer class="py-8 px-6 md:px-8 border-t">
    <div class="max-w-4xl mx-auto text-sm text-slate-500">
      © 2026 TMG. All rights reserved. | <a href="/zh/privacy.html" class="hover:underline">隐私</a> | <a href="/zh/cookie.html" class="hover:underline">Cookie</a>
    </div>
  </footer>
  <div id="formSuccess" class="hidden">
    <div class="fixed inset-0 flex items-center justify-center bg-black/20">
      <div class="bg-white p-8 rounded shadow max-w-md w-full">
        <div class="text-center">
          <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
          </div>
          <h3 class="text-lg font-bold mb-1">谢谢</h3>
          <p class="text-sm text-slate-600 mb-4">我们将在1个工作日内回复。</p>
          <button onclick="this.closest('#formSuccess').classList.add('hidden');document.getElementById('contactForm').classList.remove('hidden');" class="text-indigo-600 font-semibold">重新提交</button>
        </div>
      </div>
    </div>
  </div>
  <div id="contactForm" class="hidden py-16 px-6 md:px-8">
    <div class="max-w-2xl mx-auto">
      <h2 class="text-2xl font-bold mb-6 text-center">留言咨询</h2>
      <form id="contactFormEl" class="bg-white p-6 rounded shadow space-y-4" action="https://formspree.io/f/registertrademarkinchina" method="POST" novalidate>
        <input type="hidden" name="_replyto" value="info@registertrademarkinchina.com">
        <input type="hidden" name="_subject" value="New Trademark Inquiry">
        <input type="hidden" name="_gotcha" style="display:none">
        <div><label class="block text-sm font-medium mb-1">姓名 *</label><input class="w-full p-2 border rounded" name="Full Name" required></div>
        <div><label class="block text-sm font-medium mb-1">公司 *</label><input class="w-full p-2 border rounded" name="Company" required></div>
        <div><label class="block text-sm font-medium mb-1">邮箱 *</label><input class="w-full p-2 border rounded" type="email" name="Email" required></div>
        <div><label class="block text-sm font-medium mb-1">主题 *</label><select class="w-full p-2 border rounded" name="Subject" required><option value="">选择…</option><option value="Trademark Search">商标检索</option><option value="Filing">申请</option><option value="Opposition">异议</option><option value="Other">其他</option></select></div>
        <div><label class="block text-sm font-medium mb-1">留言 *</label><textarea class="w-full p-2 border rounded" name="Message" rows="4" required></textarea></div>
        <button class="w-full bg-brand text-white py-2 rounded font-semibold" type="submit">发送</button>
      </form>
    </div>
  </div>
  <script src="main.js" defer></script>
</body>
</html>
