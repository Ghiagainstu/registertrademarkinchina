<script>    (function() {
      var btn = document.getElementById('lang-btn');
      var dropdown = document.getElementById('lang-dropdown');
      if (!btn || !dropdown) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
        btn.setAttribute('aria-expanded', dropdown.classList.contains('hidden') ? 'false' : 'true');
      });
      document.addEventListener('click', function() {
        dropdown.classList.add('hidden');
        btn.setAttribute('aria-expanded', 'false');
      });
      dropdown.querySelectorAll('a[data-lang]').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var lang = link.dataset.lang;
          var path = window.location.pathname;
          var slug = path.split('/').pop() || 'index.html';
          if (slug === '' || slug === '/') slug = 'index.html';
          var newPath;
          if (lang === 'en') {
            newPath = '/' + slug;
          } else {
            newPath = '/' + lang + '/' + slug;
          }
          window.location.href = newPath;
        });
      });
    })();</script>
