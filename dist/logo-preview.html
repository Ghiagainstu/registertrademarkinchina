<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Preview — RTM + CN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0F1A; color: #E2E8F0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 60px 40px; }
    h1 { font-family: 'Space Grotesk'; font-size: 24px; color: #64748B; }
    .card { background: rgba(15, 19, 32, 0.6); border: 1px solid rgba(15, 240, 179, 0.1); border-radius: 16px; padding: 48px 80px; text-align: center; }
    .card img { max-width: 320px; height: auto; }
    .nav-preview { background: rgba(15, 19, 32, 0.8); border: 1px solid rgba(15, 240, 179, 0.1); border-radius: 12px; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 700px; }
    .nav-preview img { height: 32px; width: auto; }
    .nav-links { color: #94A3B8; font-size: 13px; display: flex; gap: 24px; }
    .label { color: #64748B; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1>Logo: RTM (moon) + CN (blue)</h1>
  
  <div class="card">
    <img src="/images/logo-v1-preview.svg" alt="Logo preview">
  </div>

  <p class="label">In nav bar context</p>
  <div class="nav-preview">
    <img src="/images/logo-v1-preview.svg" alt="Logo in nav">
    <div class="nav-links"><span>Services</span><span>Process</span><span>Case Study</span><span>Classes</span><span>About</span></div>
  </div>

  <p class="label">Dark background detail</p>
  <div style="background:#070A14; border-radius:12px; padding:32px 48px;">
    <img src="/images/logo-v1-preview.svg" alt="Logo on dark" style="height:40px;">
  </div>
</body>
</html>
