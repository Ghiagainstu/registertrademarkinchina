<svg viewBox="0 0 200 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moonGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0FF0B3"/>
      <stop offset="50%" stop-color="#0FF0B3"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Moon centered -->
  <g transform="translate(88, 4)">
    <circle cx="12" cy="18" r="14" fill="url(#moonGrad2)" filter="url(#glow1)"/>
    <circle cx="18" cy="14" r="11.5" fill="#0B0F1A"/>
  </g>
  <!-- RTMCN text -->
  <text x="28" y="44" font-family="Space Grotesk, system-ui, sans-serif" font-size="28" font-weight="700" fill="#0FF0B3" letter-spacing="-1">RTM</text>
  <text x="108" y="44" font-family="Space Grotesk, system-ui, sans-serif" font-size="28" font-weight="700" fill="#00D4FF" letter-spacing="-1">CN</text>
</svg>
